<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image → CSV</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    .card { padding: 16px; border: 1px solid #ccc; border-radius: 12px; }
    label { display:block; margin: 12px 0 6px; }
    input, button { font-size: 16px; }
    #status { margin-top: 12px; white-space: pre-wrap; }
    #progress-container { margin-top: 12px; display: none; }
    progress { width: 100%; height: 20px; }
  </style>
</head>
<body>
  <h1>Image → CSV</h1>
  <div class="card">
    <p>Select an image.</p>

    <label>Image file (JPG/PNG)</label>
    <input id="file" type="file" accept="image/*" />

    <label>Output size (pixels)</label>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <div style="font-size:12px; opacity:0.8;">W</div>
        <input id="w" type="number" value="64" min="1" style="width:110px;" />
      </div>

      <button id="link" type="button" aria-pressed="true" title="Lock/unlock aspect ratio"
        style="height:38px; width:42px; border-radius:10px; border:1px solid #ccc; background:transparent; cursor:pointer;">
        🔗
      </button>

      <div>
        <div style="font-size:12px; opacity:0.8;">H</div>
        <input id="h" type="number" value="64" min="1" style="width:110px;" />
      </div>
    </div>

    <div style="margin-top:12px;">
      <button id="go" disabled>Convert to CSV and download</button>
    </div>

    <div id="status"></div>
    
    <!-- Progress Bar -->
    <div id="progress-container">
      <small id="progress-text">Converting...</small>
      <progress id="progress" value="0" max="100"></progress>
    </div>
  </div>

  <canvas id="c" style="display:none;"></canvas>
  <script src="app.js"></script>
</body>
</html>
