<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image → CSV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111113;
      --border: #222226;
      --border-hover: #3a3a42;
      --text: #e8e8ec;
      --muted: #5a5a66;
      --accent: #c8b97a;
      --accent-dim: rgba(200, 185, 122, 0.12);
      --accent-glow: rgba(200, 185, 122, 0.06);
      --danger: #e07070;
      --success: #7ec8a0;
      --mono: 'DM Mono', monospace;
      --serif: 'Cormorant Garamond', serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,185,122,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(200,185,122,0.025) 0%, transparent 60%);
    }

    .shell {
      width: 100%;
      max-width: 420px;
    }

    /* Header */
    header {
      margin-bottom: 36px;
      text-align: center;
    }

    .wordmark {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .wordmark .arrow {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 18px;
      opacity: 0.9;
    }

    .tagline {
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,185,122,0.05), transparent);
      pointer-events: none;
    }

    /* Field groups */
    .field { display: flex; flex-direction: column; gap: 7px; }

    label.field-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* File drop zone */
    .drop-zone {
      border: 1px dashed var(--border-hover);
      border-radius: 10px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: transparent;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 22px;
      margin-bottom: 6px;
      display: block;
      opacity: 0.5;
    }

    .drop-label {
      font-size: 12px;
      color: var(--muted);
    }

    .drop-label strong {
      color: var(--accent);
      font-weight: 400;
    }

    .drop-filename {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text);
      opacity: 0.8;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Size inputs */
    .size-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .size-field { flex: 1; display: flex; flex-direction: column; gap: 5px; }

    .size-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      padding: 9px 12px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* Link button */
    #link {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
      margin-bottom: 1px;
    }

    #link:hover, #link[aria-pressed="true"] {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Convert button */
    #go {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #0a0a0b;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,185,122,0.2);
    }

    #go:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(200,185,122,0.3);
    }

    #go:active:not(:disabled) {
      transform: translateY(0);
    }

    #go:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Status */
    #status {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      min-height: 16px;
      text-align: center;
      transition: color 0.3s;
    }

    #status.success { color: var(--success); }
    #status.error   { color: var(--danger); }

    /* Progress */
    #progress-container {
      display: none;
      flex-direction: column;
      gap: 7px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #progress-text {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #progress-pct {
      font-size: 11px;
      color: var(--accent);
      font-weight: 400;
    }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #e8d89a);
      border-radius: 2px;
      transition: width 0.15s ease;
      box-shadow: 0 0 8px rgba(200,185,122,0.5);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -28px;
    }

    /* Hidden canvas */
    canvas { display: none; }

    /* Footer */
    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0.5;
    }

    /* Debug panel */
    .debug-panel {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .debug-toggle {
      width: 100%;
      background: transparent;
      border: none;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: color 0.2s, background 0.2s;
    }

    .debug-toggle:hover { color: var(--text); background: rgba(255,255,255,0.02); }

    .debug-toggle .chevron {
      transition: transform 0.25s ease;
      font-style: normal;
      font-size: 9px;
    }

    .debug-panel.open .chevron { transform: rotate(180deg); }

    .debug-body {
      display: none;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .debug-panel.open .debug-body { display: flex; }

    .debug-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(34,34,38,0.6);
      transition: background 0.15s;
    }

    .debug-row:last-child { border-bottom: none; }

    .debug-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
      transition: background 0.3s;
    }

    .debug-dot.ok      { background: var(--success); box-shadow: 0 0 6px rgba(126,200,160,0.4); }
    .debug-dot.fail    { background: var(--danger);  box-shadow: 0 0 6px rgba(224,112,112,0.4); }
    .debug-dot.warn    { background: var(--accent);  box-shadow: 0 0 6px rgba(200,185,122,0.4); }

    .debug-label {
      font-size: 11px;
      color: var(--muted);
      flex: 1;
    }

    .debug-value {
      font-size: 11px;
      color: var(--text);
      opacity: 0.7;
      text-align: right;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .shell {
      animation: fadeUp 0.5s ease both;
    }
  </style>
</head>
<body>

<div class="shell">
  <header>
    <div class="wordmark">
      Image <span class="arrow">→</span> CSV
    </div>
    <p class="tagline">Pixel luminance extractor</p>
  </header>

  <div class="card">

    <!-- File upload -->
    <div class="field">
      <label class="field-label">Source image</label>
      <div class="drop-zone" id="drop-zone">
        <input id="file" type="file" accept="image/*" />
        <span class="drop-icon">⬡</span>
        <div class="drop-label"><strong>Choose file</strong> or drag & drop</div>
        <div class="drop-label" style="font-size:10px; margin-top:3px;">JPG · PNG · WEBP · GIF</div>
        <div class="drop-filename" id="drop-filename"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Output size -->
    <div class="field">
      <label class="field-label">Output size (px)</label>
      <div class="size-row">
        <div class="size-field">
          <div class="size-label">Width</div>
          <input id="w" type="number" value="64" min="1" />
        </div>
        <button id="link" type="button" aria-pressed="true" title="Lock aspect ratio">🔗</button>
        <div class="size-field">
          <div class="size-label">Height</div>
          <input id="h" type="number" value="64" min="1" />
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Progress -->
    <div id="progress-container">
      <div class="progress-header">
        <span id="progress-text">Converting</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Status -->
    <div id="status"></div>

    <!-- CTA -->
    <button id="go" disabled>Convert &amp; Download</button>

  </div>

  <footer>grayscale luminance · BT.709 coefficients</footer>

  <!-- Debug panel -->
  <div class="debug-panel" id="debug-panel">
    <button class="debug-toggle" id="debug-toggle" type="button">
      <span>Diagnostics</span>
      <span class="chevron">▼</span>
    </button>
    <div class="debug-body" id="debug-body">
      <div class="debug-row">
        <div class="debug-dot" id="dbg-dot-file"></div>
        <span class="debug-label">Image file</span>
        <span class="debug-value" id="dbg-val-file">No file selected</span>
      </div>
      <div class="debug-row">
        <div class="debug-dot" id="dbg-dot-type"></div>
        <span class="debug-label">File type</span>
        <span class="debug-value" id="dbg-val-type">—</span>
      </div>
      <div class="debug-row">
        <div class="debug-dot" id="dbg-dot-load"></div>
        <span class="debug-label">Image loaded</span>
        <span class="debug-value" id="dbg-val-load">—</span>
      </div>
      <div class="debug-row">
        <div class="debug-dot" id="dbg-dot-dims"></div>
        <span class="debug-label">Output dimensions</span>
        <span class="debug-value" id="dbg-val-dims">—</span>
      </div>
      <div class="debug-row">
        <div class="debug-dot" id="dbg-dot-canvas"></div>
        <span class="debug-label">Canvas API</span>
        <span class="debug-value" id="dbg-val-canvas">—</span>
      </div>
      <div class="debug-row">
        <div class="debug-dot" id="dbg-dot-ready"></div>
        <span class="debug-label">Ready to convert</span>
        <span class="debug-value" id="dbg-val-ready">Waiting…</span>
      </div>
    </div>
  </div>

<canvas id="c"></canvas>

<script>
const fileInput = document.getElementById("file");
const btn       = document.getElementById("go");
const statusEl  = document.getElementById("status");
const canvas    = document.getElementById("c");
const ctx       = canvas.getContext("2d", { willReadFrequently: true });

const wInput    = document.getElementById("w");
const hInput    = document.getElementById("h");
const linkBtn   = document.getElementById("link");

const progressContainer = document.getElementById("progress-container");
const progressFill      = document.getElementById("progress-fill");
const progressText      = document.getElementById("progress-text");
const progressPct       = document.getElementById("progress-pct");
const dropZone          = document.getElementById("drop-zone");
const dropFilename      = document.getElementById("drop-filename");

let isLinked   = true;
let aspect     = null;
let suppressSync = false;
let lastEdited = "w";

function setLinkUI() {
  linkBtn.setAttribute("aria-pressed", String(isLinked));
  linkBtn.textContent = isLinked ? "🔗" : "⛓️";
  linkBtn.title = isLinked ? "Aspect ratio locked" : "Aspect ratio unlocked";
}
setLinkUI();

function setStatus(msg, type = "") {
  statusEl.textContent = msg;
  statusEl.className = type;
}

function setProgress(pct) {
  progressFill.style.width = pct + "%";
  progressPct.textContent  = pct + "%";
}

function syncFromWidth() {
  if (suppressSync || !aspect) return;
  const w = Math.max(1, parseInt(wInput.value || "1", 10));
  suppressSync = true;
  hInput.value = String(Math.max(1, Math.round(w * aspect)));
  suppressSync = false;
}

function syncFromHeight() {
  if (suppressSync || !aspect) return;
  const h = Math.max(1, parseInt(hInput.value || "1", 10));
  suppressSync = true;
  wInput.value = String(Math.max(1, Math.round(h / aspect)));
  suppressSync = false;
}

linkBtn.addEventListener("click", () => {
  isLinked = !isLinked;
  setLinkUI();
  if (isLinked && aspect) {
    if (lastEdited === "h") syncFromHeight();
    else syncFromWidth();
  }
});

wInput.addEventListener("input", () => {
  if (suppressSync) return;
  lastEdited = "w";
  if (isLinked && aspect) syncFromWidth();
});

hInput.addEventListener("input", () => {
  if (suppressSync) return;
  lastEdited = "h";
  if (isLinked && aspect) syncFromHeight();
});

// Drag & drop styling
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); });

fileInput.addEventListener("change", async () => {
  const file = fileInput.files?.[0];
  btn.disabled = !file;
  if (!file) { setStatus(""); dropFilename.textContent = ""; updateDebug(); return; }

  dropFilename.textContent = file.name;
  setStatus("Reading image…");
  try {
    const img = await fileToImage(file);
    aspect = img.height / img.width;
    syncFromWidth();
    setStatus("Ready — " + img.naturalWidth + " × " + img.naturalHeight + " px");
    updateDebug();
  } catch (e) {
    setStatus("Error loading image.", "error");
    dbg("load", "fail", e.message);
    updateDebug();
    console.error(e);
  }
});

btn.addEventListener("click", async () => {
  const file = fileInput.files?.[0];
  if (!file) return;

  setStatus("Loading image…");
  progressContainer.style.display = "none";
  setProgress(0);

  const img = await fileToImage(file);
  if (!aspect) aspect = img.height / img.width;

  let outW = Math.max(1, parseInt(wInput.value || "64", 10));
  let outH = Math.max(1, parseInt(hInput.value || "64", 10));

  if (isLinked && aspect) {
    if (lastEdited === "h") { outW = Math.max(1, Math.round(outH / aspect)); wInput.value = outW; }
    else                    { outH = Math.max(1, Math.round(outW * aspect)); hInput.value = outH; }
  }

  canvas.width  = outW;
  canvas.height = outH;
  ctx.clearRect(0, 0, outW, outH);
  ctx.drawImage(img, 0, 0, outW, outH);

  setStatus("Converting…");
  progressContainer.style.display = "flex";
  setProgress(0);

  const imageData = ctx.getImageData(0, 0, outW, outH);
  btn.disabled = true;
  const csv = await imageDataToGrayCsv(imageData, outW, outH);
  btn.disabled = false;

  const outName = (file.name.replace(/\.[^.]+$/, "") || "image") + `_${outW}x${outH}.csv`;
  downloadText(csv, outName);

  progressContainer.style.display = "none";
  setStatus("✓ Downloaded " + outName, "success");
});

// Debug panel
const debugPanel  = document.getElementById("debug-panel");
const debugToggle = document.getElementById("debug-toggle");
debugToggle.addEventListener("click", () => debugPanel.classList.toggle("open"));

function dbg(id, state, value) {
  const dot = document.getElementById("dbg-dot-" + id);
  const val = document.getElementById("dbg-val-" + id);
  if (dot) { dot.className = "debug-dot " + (state || ""); }
  if (val && value !== undefined) val.textContent = value;
}

function checkCanvasSupport() {
  try {
    const test = document.createElement("canvas");
    const ok   = !!(test.getContext && test.getContext("2d"));
    dbg("canvas", ok ? "ok" : "fail", ok ? "Supported" : "Not supported");
    return ok;
  } catch(e) {
    dbg("canvas", "fail", "Error: " + e.message);
    return false;
  }
}

function updateDebug() {
  const file   = fileInput.files?.[0];
  const w      = parseInt(wInput.value, 10);
  const h      = parseInt(hInput.value, 10);
  const dimsOk = w >= 1 && h >= 1 && !isNaN(w) && !isNaN(h);

  // File check
  if (file) {
    dbg("file", "ok", file.name);
  } else {
    dbg("file", "fail", "No file selected");
  }

  // Type check
  const allowed = ["image/jpeg","image/png","image/webp","image/gif","image/bmp","image/tiff"];
  if (file) {
    const ok = allowed.includes(file.type) || file.type.startsWith("image/");
    dbg("type", ok ? "ok" : "warn", file.type || "unknown");
  } else {
    dbg("type", "", "—");
  }

  // Load check
  if (!file) {
    dbg("load", "", "—");
  } else if (aspect !== null) {
    dbg("load", "ok", "Yes — aspect " + aspect.toFixed(3));
  } else {
    dbg("load", "warn", "Not yet loaded");
  }

  // Dims check
  if (!dimsOk) {
    dbg("dims", "fail", (isNaN(w) ? "W invalid" : w < 1 ? "W < 1" : "") + (isNaN(h) ? " H invalid" : h < 1 ? " H < 1" : ""));
  } else {
    dbg("dims", "ok", w + " × " + h + " px");
  }

  // Ready
  const canvasOk = true; // already checked on load
  const ready    = !!file && aspect !== null && dimsOk && canvasOk;
  if (ready) {
    dbg("ready", "ok", "Yes");
  } else {
    const reasons = [];
    if (!file)          reasons.push("no file");
    if (aspect === null && file) reasons.push("image not loaded");
    if (!dimsOk)        reasons.push("invalid dimensions");
    dbg("ready", "fail", reasons.join(", ") || "unknown");
  }
}

// Run canvas check once on load
checkCanvasSupport();
updateDebug();

// Re-run debug on any relevant change
wInput.addEventListener("input", updateDebug);
hInput.addEventListener("input", updateDebug);


function fileToImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Failed to load image")); };
    img.src = url;
  });
}

async function imageDataToGrayCsv(imageData, width, height) {
  const { data } = imageData;
  const lines = [];
  const CHUNK = 50;

  for (let y = 0; y < height; y++) {
    const row = [];
    for (let x = 0; x < width; x++) {
      const i    = (y * width + x) * 4;
      const gray = Math.round(0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]);
      row.push(String(gray));
    }
    lines.push(row.join(","));

    if (y % CHUNK === 0 || y === height - 1) {
      const pct = Math.round(((y + 1) / height) * 100);
      setProgress(pct);
      progressText.textContent = "Converting";
      await new Promise(r => setTimeout(r, 0));
    }
  }
  return lines.join("\n");
}

function downloadText(text, filename) {
  const blob = new Blob([text], { type: "text/csv;charset=utf-8" });
  const a    = document.createElement("a");
  a.href     = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
</script>
